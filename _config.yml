# =================================================
# 1. 基础设置 (保持不动)
# =================================================
title: 云一的小窝
author: 云一
language: zh-CN
timezone: ''
url: https://my-99d.pages.dev
permalink: :year/:month/:day/:title/

# 关键：告诉 Hexo 咱们用的是 butterfly 主题
theme: butterfly

# =================================================
# 2. 部署设置
# =================================================
deploy:
  type: ''

# =================================================
# 3. 主题个性化 (必须放在最后！！)
# =================================================
theme_config:
  # 背景图 (用你的 bg.png)
  background: /bg.png
  
  # 头像 (注意！我改成了和背景一样的图，这样你只要看到头像变了，就说明成功了！)
  avatar:
    img: /bg.png
    effect: true
    
  # 公告
  notice:
    enable: true
    content: "配置终于生效了！"

# =================================================
# 4. 其他杂项 (防止报错)
# =================================================
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
