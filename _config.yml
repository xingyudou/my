# ==================================================
# 1. 主题核心设置 (放在最前面，确保生效)
# ==================================================
theme_config:
  # 背景图 (对应 source/bg.png)
  background: /bg.png
  
  # 头像
  avatar:
    img: https://unpkg.com/hexo-theme-butterfly/source/img/avatar.png
    effect: true
    
  # 公告
  notice:
    enable: true
    content: "终于成功了"

# ==================================================
# 2. 博客基础配置 (不要动下面这些)
# ==================================================
# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: 雲一
subtitle: ''
description: ''
keywords:
author: 雲一
language: zh-CN
timezone: ''

# URL
## Set your site url here.
url: https://my-99d.pages.dev
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: butterfly

# Deployment
deploy:
  type: ''
